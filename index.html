<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://ais-pre-yr7vuwqju6v52jgcgrdxgx-220375696903.europe-west2.run.app/assets/file_000000007e6c71f4868ae4f798c2c5cc_112808.png" />
    <title>StitchLab • تفاعلية تعلم الإنجليزية الذكية</title>
  </head>
  <body class="bg-[#fafdf5] text-slate-900 overflow-x-hidden select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Service Worker registration with smart background updates
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('StitchLab PWA Service Worker Registered!', reg.scope);
              
              // Smart background check for service worker updates every 5 minutes silently
              setInterval(() => {
                reg.update().catch(err => console.log('Silent update check skipped:', err));
              }, 300000);
            })
            .catch(err => console.error('Service Worker Registry Failed:', err));
        });
      }

      // Defer installation prompt
      window.deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredInstallPrompt = e;
        
        // Dispatch a custom event to notify our React app that PWA installation is ready!
        const event = new CustomEvent('pwa-installable', { detail: e });
        window.dispatchEvent(event);
      });
    </script>
  </body>
</html>
